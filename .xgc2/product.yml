schema: xgc2.product.v1
id: xgc2-tbb
name: XGC2 oneTBB
version: 0.1.0-12
kind: toolchain-apt
summary: System-level oneAPI Threading Building Blocks runtime for XGC2 projects on
  Ubuntu 20.04, 22.04, and 24.04.
apt:
  distribution: focal,jammy,noble
  install:
  - xgc2-tbb
  packages:
  - xgc2-tbb
  depends:
  - libc6
  - libgcc-s1
  - libstdc++6
usage:
  install: 'sudo apt update

    sudo apt install xgc2-tbb

    '
  notes: 'CMake consumers should use find_package(xgc2_tbb REQUIRED CONFIG).

    The upstream oneTBB CMake package remains available under /opt/xgc2/tbb.

    '
  smoke_test: 'source /opt/xgc2/tbb/setup.bash

    cmake --find-package -DNAME=xgc2_tbb -DCOMPILER_ID=GNU -DLANGUAGE=CXX -DMODE=EXIST

    '
ownership:
  paths:
  - /opt/xgc2/tbb
  - /usr/lib/cmake/xgc2_tbb
  - /etc/ld.so.conf.d/xgc2-tbb.conf
release:
  repository: lxk36/xgc2-tbb
  ref: master
  workflow: release.yml
  apt_versions:
    focal: 0.1.0-12~focal
    jammy: 0.1.0-12~jammy
    noble: 0.1.0-12~noble
conflicts:
  apt_packages:
  - ros-noetic-xgc2-tbb
