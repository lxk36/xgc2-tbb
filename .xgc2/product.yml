schema: xgc2.product.v1
id: xgc2-tbb
name: XGC2 oneTBB
kind: toolchain-apt
summary: ROS Noetic vendor package for the XGC2 oneAPI Threading Building Blocks runtime.

ros:
  distro: noetic
  packages:
    - xgc2_tbb

apt:
  distribution: focal
  install:
    - ros-noetic-xgc2-tbb
  packages:
    - ros-noetic-xgc2-tbb

usage:
  install: |
    sudo apt update
    sudo apt install ros-noetic-xgc2-tbb
  smoke_test: |
    rospack find xgc2_tbb

ownership:
  paths:
    - /opt/ros/noetic/share/xgc2_tbb
