name: release

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: Expected .xgc2/product.yml version
        required: true
        type: string
      expected_source_sha:
        description: Expected source commit SHA
        required: true
        type: string
      publish_apt:
        description: Publish debs to the APT repository
        required: true
        type: boolean
        default: false
      run_cpp_quality:
        description: Run C++ quality checks
        required: true
        type: boolean
        default: false
      run_source_tests:
        description: Run source tests
        required: true
        type: boolean
        default: false

      release_id:
        description: Parent orchestrator run id used for correlation and audit.
        required: false
        default: ""
        type: string
      release_lock_digest:
        description: SHA256 of the immutable release lock.
        required: false
        default: ""
        type: string
      trusted_ci_run_id:
        description: Exact successful push CI run whose trusted deb artifacts may be reused
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: read

jobs:
  release-guard:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release inputs
        run: |
          set -euo pipefail
          product_version="$(awk -F': *' '/^version:[[:space:]]*/ {print $2; exit}' .xgc2/product.yml)"
          if [[ "${product_version}" != "${{ inputs.expected_version }}" ]]; then
            echo "product.yml version ${product_version} != expected_version ${{ inputs.expected_version }}" >&2
            exit 1
          fi
          source_sha="$(git rev-parse HEAD)"
          if [[ "${source_sha}" != "${{ inputs.expected_source_sha }}" ]]; then
            echo "HEAD ${source_sha} != expected_source_sha ${{ inputs.expected_source_sha }}" >&2
            exit 1
          fi

  package-compliance:
    needs: release-guard
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check whitespace
        run: git -C "${GITHUB_WORKSPACE}" diff --check HEAD

      - name: Package compliance
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          ./.xgc2/scripts/check_package_compliance.sh

  cpp-quality:
    if: ${{ inputs.run_cpp_quality }}
    needs: release-guard
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: No C++ quality gate configured
        run: echo "No standalone C++ quality gate is configured for xgc2-tbb."

  source-tests:
    if: ${{ inputs.run_source_tests }}
    needs: release-guard
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: No source tests configured
        run: echo "No standalone source tests are configured for xgc2-tbb."

  deb-build-and-smoke:
    needs: release-guard
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            image: ubuntu:20.04
            distribution: focal
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            image: ubuntu:20.04
            distribution: focal
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            image: ubuntu:22.04
            distribution: jammy
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            image: ubuntu:22.04
            distribution: jammy
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            image: ubuntu:24.04
            distribution: noble
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            image: ubuntu:24.04
            distribution: noble
    defaults:
      run:
        shell: bash
    env:
      XGC2_TBB_JOBS: "2"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download trusted CI artifacts
        if: ${{ inputs.trusted_ci_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.trusted_ci_run_id }}
          name: xgc2-tbb-${{ matrix.distribution }}-${{ matrix.arch }}
          path: .ci/trusted

      - name: Verify and stage trusted CI artifacts
        if: ${{ inputs.trusted_ci_run_id != '' }}
        run: |
          python3 .xgc2/scripts/xgc2_artifact_manifest.py verify-build \
            --artifact-dir .ci/trusted \
            --deb-output-dir .ci/debs \
            --manifest-output-dir .ci/build-manifests \
            --product xgc2-tbb \
            --distribution "${{ matrix.distribution }}" \
            --architecture "${{ matrix.arch }}" \
            --source-sha "${{ inputs.expected_source_sha }}" \
            --ci-run-id "${{ inputs.trusted_ci_run_id }}"

      - name: Build deb and run installed smoke test
        if: ${{ inputs.trusted_ci_run_id == '' }}
        run: |
          set -euo pipefail
          docker run --rm \
            --platform "${{ matrix.platform }}" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            -e XGC2_TBB_JOBS="${XGC2_TBB_JOBS}" \
            "${{ matrix.image }}" \
            bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential \
                ca-certificates \
                cmake \
                curl \
                dpkg-dev \
                fakeroot \
                file \
                git \
                python3
              ./.xgc2/scripts/check_package_compliance.sh
              ./.xgc2/scripts/build_deb.sh
              apt-get install -y ./.ci/debs/xgc2-tbb_*.deb
              ./.xgc2/scripts/smoke_test_installed.sh
            '

      - name: Create fallback build manifest
        if: ${{ inputs.trusted_ci_run_id == '' }}
        run: |
          python3 .xgc2/scripts/xgc2_artifact_manifest.py build \
            --deb-dir .ci/debs \
            --output-dir .ci/build-manifests \
            --product xgc2-tbb \
            --product-version "${{ inputs.expected_version }}" \
            --distribution "${{ matrix.distribution }}" \
            --architecture "${{ matrix.arch }}" \
            --source-sha "${{ inputs.expected_source_sha }}" \
            --ci-run-id "$GITHUB_RUN_ID" \
            --ci-workflow "$GITHUB_WORKFLOW" \
            --ci-workflow-ref "$GITHUB_WORKFLOW_REF"

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xgc2-tbb-${{ matrix.distribution }}-${{ matrix.arch }}
          path: |
            .ci/debs/*.deb
            .ci/build-manifests/*.json
          retention-days: 14
          include-hidden-files: true

  publish-apt:
    if: >-
      ${{
        always() &&
        inputs.publish_apt &&
        needs.deb-build-and-smoke.result == 'success' &&
        needs.package-compliance.result == 'success' &&
        (needs.cpp-quality.result == 'success' || needs.cpp-quality.result == 'skipped') &&
        (needs.source-tests.result == 'success' || needs.source-tests.result == 'skipped')
      }}
    needs:
      - deb-build-and-smoke
      - package-compliance
      - cpp-quality
      - source-tests
    runs-on: ubuntu-latest
    concurrency:
      group: xgc2-apt-${{ matrix.distribution }}
      cancel-in-progress: false
    strategy:
      max-parallel: 1
      matrix:
        distribution: [focal, jammy, noble]
    env:
      APT_REPO_HOST: ${{ secrets.APT_REPO_HOST }}
      APT_REPO_PORT: ${{ secrets.APT_REPO_PORT }}
      APT_REPO_USER: ${{ secrets.APT_REPO_USER }}
      APT_REPO_SSH_KEY: ${{ secrets.APT_REPO_SSH_KEY }}
      APT_REPO_KNOWN_HOSTS: ${{ secrets.APT_REPO_KNOWN_HOSTS }}
      APT_REPO_DISTRIBUTION: ${{ matrix.distribution }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Download all architecture artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: xgc2-tbb-${{ matrix.distribution }}-*
          path: release-input

      - name: Validate artifacts and create release manifests
        run: |
          for arch in amd64 arm64; do
            python3 .xgc2/scripts/xgc2_artifact_manifest.py verify-build \
              --artifact-dir release-input \
              --deb-output-dir staged/debs \
              --manifest-output-dir staged/build-manifests \
              --product xgc2-tbb \
              --distribution "${{ matrix.distribution }}" \
              --architecture "$arch" \
              --source-sha "${{ inputs.expected_source_sha }}"
          done
          python3 .xgc2/scripts/xgc2_artifact_manifest.py release \
            --deb-dir staged/debs \
            --build-manifest-dir staged/build-manifests \
            --publish-dir publish \
            --product xgc2-tbb \
            --product-version "${{ inputs.expected_version }}" \
            --distribution "${{ matrix.distribution }}" \
            --source-sha "${{ inputs.expected_source_sha }}" \
            --release-id "${{ inputs.release_id || github.run_id }}" \
            --release-lock-digest "${{ inputs.release_lock_digest }}"

      - name: Publish one distribution atomically
        run: ./.xgc2/scripts/publish_self_hosted_apt.sh --deb-dir publish
