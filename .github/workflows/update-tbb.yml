name: update-tbb

on:
  schedule:
    - cron: "0 2 */2 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  open-update-pr:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Check latest oneTBB release
        id: latest
        run: |
          set -euo pipefail
          latest_tag="$(python3 - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("https://api.github.com/repos/uxlfoundation/oneTBB/releases/latest") as response:
              data = json.load(response)
          print(data["tag_name"])
          PY
          )"
          current_ref="$(sed -n 's/^TBB_REF=//p' tbb.lock | head -n 1)"
          current_sha="$(sed -n 's/^TBB_SHA=//p' tbb.lock | head -n 1)"
          echo "latest_tag=${latest_tag}" >> "${GITHUB_OUTPUT}"
          echo "current_ref=${current_ref}" >> "${GITHUB_OUTPUT}"
          echo "current_sha=${current_sha}" >> "${GITHUB_OUTPUT}"
          if [[ "${current_ref}" != "${latest_tag}" || -n "${current_sha}" ]]; then
            sed -i "s/^TBB_REF=.*/TBB_REF=${latest_tag}/" tbb.lock
            sed -i "s/^TBB_SHA=.*/TBB_SHA=/" tbb.lock
          fi

      - name: Create pull request
        id: cpr
        if: steps.latest.outputs.current_ref != steps.latest.outputs.latest_tag || steps.latest.outputs.current_sha != ''
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/update-onetbb-${{ steps.latest.outputs.latest_tag }}
          base: master
          title: "Update oneTBB to ${{ steps.latest.outputs.latest_tag }}"
          commit-message: "Update oneTBB to ${{ steps.latest.outputs.latest_tag }}"
          body: |
            Automated oneTBB vendor update from the latest upstream release.

            - Previous ref: `${{ steps.latest.outputs.current_ref }}`
            - Previous SHA override: `${{ steps.latest.outputs.current_sha }}`
            - New ref: `${{ steps.latest.outputs.latest_tag }}`

            This PR must pass package compliance and native deb build/test before merge.

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" \
            --auto \
            --squash \
            --delete-branch
