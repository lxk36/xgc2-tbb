name: ci

on:
  push:
    branches:
      - noetic
  pull_request:
    branches:
      - noetic
  workflow_dispatch:

jobs:
  package-compliance:
    runs-on: ubuntu-22.04
    container:
      image: ros:noetic-ros-base-focal
    defaults:
      run:
        shell: bash
    steps:
      - name: Install CI tools
        run: |
          set -euo pipefail
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git \
            libxml2-utils

      - name: Checkout
        uses: actions/checkout@v4

      - name: Trust checkout directory
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Check whitespace
        run: git -C "${GITHUB_WORKSPACE}" diff --check HEAD

      - name: Package compliance
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          ./.xgc2/scripts/check_package_compliance.sh

  noetic-deb-build-and-smoke:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-22.04-arm
            platform: linux/arm64
    defaults:
      run:
        shell: bash
    env:
      TBB_VENDOR_JOBS: "2"
      XGC2_TBB_OS_NAME: ubuntu
      XGC2_TBB_OS_VERSION: focal
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deb and run installed smoke test
        run: |
          set -euo pipefail
          docker run --rm \
            --platform "${{ matrix.platform }}" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            -e TBB_VENDOR_JOBS="${TBB_VENDOR_JOBS}" \
            -e XGC2_TBB_OS_NAME="${XGC2_TBB_OS_NAME}" \
            -e XGC2_TBB_OS_VERSION="${XGC2_TBB_OS_VERSION}" \
            ros:noetic-ros-base-focal \
            bash -lc '
              set -euo pipefail
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                apt-utils \
                build-essential \
                ca-certificates \
                cmake \
                debhelper \
                dpkg-dev \
                fakeroot \
                git \
                libxml2-utils \
                python3-bloom \
                python3-catkin-pkg-modules \
                python3-empy \
                python3-rosdep \
                python3-rosdep-modules
              rosdep init 2>/dev/null || true
              rosdep update
              rosdep install --from-paths . --ignore-src -r -y --rosdistro noetic
              ./.xgc2/scripts/check_package_compliance.sh
              ./.xgc2/scripts/build_deb.sh
              apt-get install -y ./.ci/debs/*.deb
              ./.xgc2/scripts/smoke_test_installed.sh
              ./.xgc2/scripts/publish_apt_repo.sh ".ci/apt-${{ matrix.arch }}" .ci/debs focal main
            '

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ros-noetic-xgc2-tbb-${{ matrix.arch }}
          path: |
            .ci/debs/*.deb
            .ci/apt-${{ matrix.arch }}/

      - name: Publish to self-hosted APT repository
        if: github.event_name != 'pull_request'
        env:
          APT_REPO_HOST: ${{ secrets.APT_REPO_HOST }}
          APT_REPO_PORT: ${{ secrets.APT_REPO_PORT }}
          APT_REPO_USER: ${{ secrets.APT_REPO_USER }}
          APT_REPO_SSH_KEY: ${{ secrets.APT_REPO_SSH_KEY }}
          APT_REPO_KNOWN_HOSTS: ${{ secrets.APT_REPO_KNOWN_HOSTS }}
          APT_REPO_DISTRIBUTION: focal
        run: ./.xgc2/scripts/publish_self_hosted_apt.sh --deb-dir .ci/debs
