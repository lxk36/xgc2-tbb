name: ci

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  package-compliance:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check whitespace
        run: git -C "${GITHUB_WORKSPACE}" diff --check HEAD

      - name: Package compliance
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          ./.xgc2/scripts/check_package_compliance.sh

  deb-build-and-smoke:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            image: ubuntu:20.04
            distribution: focal
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            image: ubuntu:20.04
            distribution: focal
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            image: ubuntu:22.04
            distribution: jammy
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            image: ubuntu:22.04
            distribution: jammy
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            image: ubuntu:24.04
            distribution: noble
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            image: ubuntu:24.04
            distribution: noble
    defaults:
      run:
        shell: bash
    env:
      XGC2_TBB_JOBS: "2"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deb and run installed smoke test
        run: |
          set -euo pipefail
          install -d .ci/build-manifests
          docker run --rm \
            --platform "${{ matrix.platform }}" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            -e XGC2_TBB_JOBS="${XGC2_TBB_JOBS}" \
            "${{ matrix.image }}" \
            bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential \
                ca-certificates \
                cmake \
                curl \
                dpkg-dev \
                fakeroot \
                file \
                git \
                python3
              ./.xgc2/scripts/check_package_compliance.sh
              ./.xgc2/scripts/build_deb.sh
              apt-get install -y ./.ci/debs/xgc2-tbb_*.deb
              ./.xgc2/scripts/smoke_test_installed.sh
            '

      - name: Create trusted build manifest
        run: |
          product_version="$(awk -F': *' '/^version:/ {print $2; exit}' .xgc2/product.yml)"
          python3 .xgc2/scripts/xgc2_artifact_manifest.py build \
            --deb-dir .ci/debs \
            --output-dir .ci/build-manifests \
            --product xgc2-tbb \
            --product-version "$product_version" \
            --distribution "${{ matrix.distribution }}" \
            --architecture "${{ matrix.arch }}" \
            --source-sha "$GITHUB_SHA" \
            --ci-run-id "$GITHUB_RUN_ID" \
            --ci-workflow "$GITHUB_WORKFLOW" \
            --ci-workflow-ref "$GITHUB_WORKFLOW_REF"

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xgc2-tbb-${{ matrix.distribution }}-${{ matrix.arch }}
          path: |
            .ci/debs/*.deb
            .ci/build-manifests/*.json
          retention-days: 14
          include-hidden-files: true
